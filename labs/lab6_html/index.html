<!DOCTYPE html>
<html lang="uk">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна 6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Лабораторна робота 6</h1>
        <p>Date, Math і модальні вікна</p>

    <main>
        <section class="block">
            <h2>Поточний час</h2>
            <button id="timeBtn">Показати час</button>
            <p id="timeText">Натисніть кнопку.</p>
        </section>

        <section class="block">
            <h2>Гра "Вгадай число"</h2>
            <p>Потрібно вгадати число від 0 до 50.</p>
            <button id="gameBtn">Почати гру</button>
            <p id="gameText">Гра ще не почалась.</p>
        </section>
    </main>

    <script src="script.js"></script>
