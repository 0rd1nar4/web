<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна 3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Лабораторна робота 3</h1>
        <p>Функції та масиви JavaScript</p>
    </header>

    <main>
        <div class="panel">
            <button onclick="taskSeconds()">Залишок секунд</button>
            <button onclick="taskPerimeter()">Периметр</button>
            <button onclick="taskFizz()">FizzBuzz</button>
            <button onclick="taskAverage()">Середнє</button>
            <button onclick="taskDivisible()">Подільність</button>
            <button onclick="taskArray()">Масив</button>
            <button onclick="taskMatrix()">Матриця 5x5</button>
            <button onclick="taskCalc()">Операції</button>
            <button onclick="taskNumberInfo()">Інформація про число</button>
            <button onclick="taskReverse()">Перевернутий масив</button>
            <button onclick="taskUnique()">Без дублікатів</button>
        </div>

        <section class="block">
            <h2>Результат</h2>
            <pre id="result">Натисніть кнопку, щоб виконати завдання.</pre>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
